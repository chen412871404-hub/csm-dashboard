<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSM 客户管理仪表盘</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }
  
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header-sub { font-size: 13px; color: #aab4be; margin-top: 4px; }
  .header-badge { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 14px; font-size: 13px; text-align: right; }
  .header-badge span { display: block; font-size: 11px; color: #aab4be; }

  .filter-bar { background: white; padding: 14px 32px; display: flex; gap: 16px; align-items: center; border-bottom: 1px solid #e8ecf0; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .filter-bar label { font-size: 13px; font-weight: 600; color: #555; }
  .filter-bar select, .filter-bar input { padding: 7px 12px; border: 1.5px solid #dde3ec; border-radius: 8px; font-size: 13px; background: #f8f9fb; color: #333; outline: none; cursor: pointer; }
  .filter-bar select:focus, .filter-bar input:focus { border-color: #0f3460; }
  .multiselect-wrap { position: relative; display: inline-block; }
  .multiselect-btn { padding: 7px 12px; border: 1.5px solid #dde3ec; border-radius: 8px; font-size: 13px; background: #f8f9fb; color: #333; cursor: pointer; display: flex; align-items: center; gap: 6px; min-width: 140px; user-select: none; white-space: nowrap; }
  .multiselect-btn:hover { border-color: #0f3460; }
  .multiselect-btn .ms-arrow { margin-left: auto; font-size: 10px; color: #888; }
  .multiselect-btn .ms-badge { background: #0f3460; color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 700; }
  .multiselect-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 999; background: white; border: 1.5px solid #dde3ec; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); min-width: 180px; max-height: 280px; overflow-y: auto; padding: 6px 0; }
  .multiselect-dropdown.open { display: block; }
  .ms-option { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; color: #333; transition: background 0.1s; }
  .ms-option:hover { background: #f0f4ff; }
  .ms-option input[type=checkbox] { accent-color: #0f3460; width: 14px; height: 14px; cursor: pointer; }
  .ms-option.select-all { font-weight: 700; color: #0f3460; border-bottom: 1px solid #f0f2f5; margin-bottom: 4px; }
  .ms-clear { padding: 6px 14px; font-size: 12px; color: #e74c3c; cursor: pointer; border-top: 1px solid #f0f2f5; margin-top: 4px; text-align: center; font-weight: 600; }
  .ms-clear:hover { background: #fff5f5; }
  .filter-bar .reset-btn { padding: 7px 16px; background: #0f3460; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .filter-bar .reset-btn:hover { background: #16213e; }
  #result-count { font-size: 13px; color: #888; margin-left: auto; }

  .main { padding: 24px 32px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid #0f3460; }
  .kpi-card.orange { border-left-color: #e87c2d; }
  .kpi-card.green { border-left-color: #2ecc71; }
  .kpi-card.red { border-left-color: #e74c3c; }
  .kpi-card.purple { border-left-color: #9b59b6; }
  .kpi-card.teal { border-left-color: #1abc9c; }
  .kpi-label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 800; color: #1a1a2e; }
  .kpi-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .charts-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f0f2f5; }
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap-sm { position: relative; height: 220px; }

  .table-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .table-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .table-search { padding: 7px 12px; border: 1.5px solid #dde3ec; border-radius: 8px; font-size: 13px; width: 220px; outline: none; }
  .table-search:focus { border-color: #0f3460; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8f9fb; color: #555; font-weight: 700; padding: 10px 12px; text-align: left; border-bottom: 2px solid #e8ecf0; position: sticky; top: 0; cursor: pointer; white-space: nowrap; user-select: none; }
  thead th:hover { background: #eef0f5; }
  thead th .sort-icon { color: #bbb; margin-left: 4px; font-size: 10px; }
  thead th.sort-asc .sort-icon::after { content: "▲"; color: #0f3460; }
  thead th.sort-desc .sort-icon::after { content: "▼"; color: #0f3460; }
  thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: "⇅"; }
  tbody tr { border-bottom: 1px solid #f0f2f5; transition: background 0.15s; }
  tbody tr:hover { background: #f8faff; }
  tbody td { padding: 10px 12px; color: #333; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-高活跃 { background: #d4f5e9; color: #1a8a5e; }
  .badge-潜力活跃 { background: #dbeafe; color: #1e40af; }
  .badge-边缘活跃 { background: #fef3c7; color: #92400e; }
  .badge-休眠 { background: #fee2e2; color: #991b1b; }
  .badge-up { background: #d4f5e9; color: #1a8a5e; }
  .badge-flat { background: #f1f5f9; color: #475569; }
  .badge-down { background: #fee2e2; color: #991b1b; }
  .badge-sleep { background: #f1f5f9; color: #666; }
  .ai-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .ai-bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, #0f3460, #e94560); }
  .ai-val { font-size: 12px; color: #666; min-width: 40px; }

  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f2f5; }
  .pagination-info { font-size: 13px; color: #888; }
  .pagination-btns { display: flex; gap: 6px; }
  .pg-btn { padding: 6px 12px; border: 1.5px solid #dde3ec; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
  .pg-btn:hover { background: #f0f2f5; }
  .pg-btn.active { background: #0f3460; color: white; border-color: #0f3460; }
  .pg-btn:disabled { opacity: 0.4; cursor: default; }

  @media (max-width: 768px) {
    .charts-grid, .charts-grid-3 { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 12px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 CSM 客户管理仪表盘</h1>
    <div class="header-sub">Customer Success Manager · 客户活跃度与AI使用分析</div>
  </div>
  <div class="header-badge">
    <strong id="last-date">— </strong>
    <span>数据更新时间</span>
  </div>
</div>

<div class="filter-bar">
  <label>CSM负责人</label>
  <select id="filter-csm">
    <option value="">全部</option>
  </select>
  <label>上月档位</label>
  <select id="filter-tier">
    <option value="">全部</option>
  </select>
  <label>档位变动</label>
  <div class="multiselect-wrap" id="change-wrap">
    <div class="multiselect-btn" id="change-btn" onclick="toggleMultiselect()">
      <span id="change-btn-text">全部</span>
      <span class="ms-arrow">▼</span>
    </div>
    <div class="multiselect-dropdown" id="change-dropdown">
      <label class="ms-option select-all"><input type="checkbox" id="ms-all" onchange="toggleAll(this)"> 全选/全不选</label>
      <div id="ms-options"></div>
      <div class="ms-clear" onclick="clearChangeFilter()">清除选择</div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetFilters()">重置</button>
  <span id="result-count"></span>
</div>

<div class="main">
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">客户总数</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">已筛选客户</div></div>
    <div class="kpi-card orange"><div class="kpi-label">平均AI开启率</div><div class="kpi-value" id="kpi-ai">—</div><div class="kpi-sub">当月平均</div></div>
    <div class="kpi-card teal"><div class="kpi-label">平均活跃天数</div><div class="kpi-value" id="kpi-days">—</div><div class="kpi-sub">本月自然月</div></div>
    <div class="kpi-card green"><div class="kpi-label">升档客户</div><div class="kpi-value" id="kpi-up">—</div><div class="kpi-sub">本月档位提升</div></div>
    <div class="kpi-card red"><div class="kpi-label">掉档客户</div><div class="kpi-value" id="kpi-down">—</div><div class="kpi-sub">本月档位下降</div></div>
    <div class="kpi-card purple"><div class="kpi-label">高活跃占比</div><div class="kpi-value" id="kpi-high">—</div><div class="kpi-sub">上月高活跃</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">👥 CSM 客户分布 & 平均AI开启率</div>
      <div class="chart-wrap"><canvas id="csmChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📈 本月档位变动分布</div>
      <div class="chart-wrap"><canvas id="changeChart"></canvas></div>
    </div>
  </div>

  <div class="charts-grid-3">
    <div class="chart-card">
      <div class="chart-title">🏷️ 上月档位构成</div>
      <div class="chart-wrap-sm"><canvas id="tierChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🤖 AI开启率分布</div>
      <div class="chart-wrap-sm"><canvas id="aiHistChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📅 本月活跃天数分布</div>
      <div class="chart-wrap-sm"><canvas id="daysChart"></canvas></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div class="table-title">🗂️ 客户明细</div>
      <input class="table-search" id="table-search" placeholder="搜索客户名称 / CSM…" oninput="renderTable()">
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable('客户名称')" data-col="客户名称">客户名称<span class="sort-icon"></span></th>
            <th onclick="sortTable('CSM负责人')" data-col="CSM负责人">CSM负责人<span class="sort-icon"></span></th>
            <th onclick="sortTable('上月档位')" data-col="上月档位">上月档位<span class="sort-icon"></span></th>
            <th onclick="sortTable('本月档位变动')" data-col="本月档位变动">本月档位变动<span class="sort-icon"></span></th>
            <th onclick="sortTable('当月AI开启率')" data-col="当月AI开启率">当月AI开启率<span class="sort-icon"></span></th>
            <th onclick="sortTable('本月活跃天数')" data-col="本月活跃天数">本月活跃天数<span class="sort-icon"></span></th>
            <th onclick="sortTable('过去7天活跃天数')" data-col="过去7天活跃天数">过去7天活跃天数<span class="sort-icon"></span></th>
            <th onclick="sortTable('最新服务日期')" data-col="最新服务日期">最新服务日期<span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="pagination-info" id="page-info"></div>
      <div class="pagination-btns" id="page-btns"></div>
    </div>
  </div>
</div>

function getChangeBadge(v) {
  if (!v) return '<span class="badge badge-flat">—</span>';
  if (v.includes('升档')) return `<span class="badge badge-up">${v}</span>`;
  if (v.includes('掉档')) return `<span class="badge badge-down">${v}</span>`;
  if (v.includes('休眠')) return `<span class="badge badge-sleep">${v}</span>`;
  return `<span class="badge badge-flat">${v}</span>`;
}

function getTierBadge(v) {
  if (!v) return '—';
  const cls = {'高活跃':'badge-高活跃','潜力活跃':'badge-潜力活跃','边缘活跃':'badge-边缘活跃','休眠':'badge-休眠'};
  return `<span class="badge ${cls[v] || 'badge-flat'}">${v}</span>`;
}

function initFilters() {
  const csms = [...new Set(RAW_DATA.map(d => d['CSM负责人']).filter(Boolean))].sort();
  const tiers = [...new Set(RAW_DATA.map(d => d['上月档位']).filter(Boolean))].sort();
  const changes = [...new Set(RAW_DATA.map(d => d['本月档位变动']).filter(Boolean))].sort();
  const csmSel = document.getElementById('filter-csm');
  const tierSel = document.getElementById('filter-tier');
  csms.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; csmSel.appendChild(o); });
  tiers.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tierSel.appendChild(o); });

  const msOptions = document.getElementById('ms-options');
  changes.forEach(c => {
    const label = document.createElement('label');
    label.className = 'ms-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = c; cb.className = 'ms-cb';
    cb.addEventListener('change', () => { updateChangeBtnLabel(); applyFilters(); });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(c));
    msOptions.appendChild(label);
  });

  const dates = RAW_DATA.map(d => d['最新服务日期']).filter(Boolean).sort();
  if (dates.length) document.getElementById('last-date').textContent = dates[dates.length - 1];

  ['filter-csm','filter-tier'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('change-wrap').contains(e.target)) {
      document.getElementById('change-dropdown').classList.remove('open');
    }
  });
}

function toggleMultiselect() {
  document.getElementById('change-dropdown').classList.toggle('open');
}

function getSelectedChanges() {
  return [...document.querySelectorAll('.ms-cb:checked')].map(cb => cb.value);
}

function updateChangeBtnLabel() {
  const sel = getSelectedChanges();
  const btn = document.getElementById('change-btn-text');
  const allCb = document.getElementById('ms-all');
  const total = document.querySelectorAll('.ms-cb').length;
  allCb.checked = sel.length === total;
  allCb.indeterminate = sel.length > 0 && sel.length < total;
  if (sel.length === 0 || sel.length === total) {
    btn.innerHTML = '全部';
    const badge = document.getElementById('change-btn-text').parentNode.querySelector('.ms-badge');
    if (badge) badge.remove();
  } else {
    btn.innerHTML = `已选 <span class="ms-badge">${sel.length}</span>`;
  }
}

function toggleAll(cb) {
  document.querySelectorAll('.ms-cb').forEach(c => c.checked = cb.checked);
  updateChangeBtnLabel();
  applyFilters();
}

function clearChangeFilter() {
  document.querySelectorAll('.ms-cb').forEach(c => c.checked = false);
  document.getElementById('ms-all').checked = false;
  updateChangeBtnLabel();
  applyFilters();
  document.getElementById('change-dropdown').classList.remove('open');
}

function applyFilters() {
  const csm = document.getElementById('filter-csm').value;
  const tier = document.getElementById('filter-tier').value;
  const changes = getSelectedChanges();
  filtered = RAW_DATA.filter(d =>
    (!csm || d['CSM负责人'] === csm) &&
    (!tier || d['上月档位'] === tier) &&
    (changes.length === 0 || changes.includes(d['本月档位变动']))
  );
  currentPage = 1;
  updateAll();
}

function resetFilters() {
  document.getElementById('filter-csm').value = '';
  document.getElementById('filter-tier').value = '';
  document.querySelectorAll('.ms-cb').forEach(c => c.checked = false);
  document.getElementById('ms-all').checked = false;
  updateChangeBtnLabel();
  filtered = [...RAW_DATA];
  currentPage = 1;
  updateAll();
}

function updateKPIs() {
  const n = filtered.length;
  document.getElementById('kpi-total').textContent = n;
  const aiVals = filtered.map(d => d['当月AI开启率']).filter(v => v != null);
  document.getElementById('kpi-ai').textContent = aiVals.length ? (aiVals.reduce((a,b)=>a+b,0)/aiVals.length).toFixed(1) + '%' : '—';
  const dayVals = filtered.map(d => d['本月活跃天数']).filter(v => v != null);
  document.getElementById('kpi-days').textContent = dayVals.length ? (dayVals.reduce((a,b)=>a+b,0)/dayVals.length).toFixed(1) + ' 天' : '—';
  const up = filtered.filter(d => d['本月档位变动'] && d['本月档位变动'].includes('升档')).length;
  const down = filtered.filter(d => d['本月档位变动'] && d['本月档位变动'].includes('掉档')).length;
  const high = filtered.filter(d => d['上月档位'] === '高活跃').length;
  document.getElementById('kpi-up').textContent = up;
  document.getElementById('kpi-down').textContent = down;
  document.getElementById('kpi-high').textContent = n ? (high/n*100).toFixed(1) + '%' : '—';
  document.getElementById('result-count').textContent = `共 ${n} 条记录`;
}

  const changeCounts = changes.map(c => filtered.filter(d=>d['本月档位变动']=== c).length);
  const changeColors = changes.map(c => c.includes('升档') ? '#2ecc71cc' : c.includes('掉档') ? '#e74c3ccc' : c.includes('休眠') ? '#95a5a6cc' : '#3498dbcc');
  if (changeChart) changeChart.destroy();
  changeChart = new Chart(document.getElementById('changeChart'), {
    type: 'bar',
    data: { labels: changes, datasets: [{ label:'客户数', data: changeCounts, backgroundColor: changeColors, borderRadius:6 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{grid:{color:'#f0f2f5'},ticks:{font:{size:11}}} } }
  });

  // Tier donut
  const tierOrder = ['高活跃','潜力活跃','边缘活跃','休眠'];
  const tierColors = ['#2ecc71','#3498db','#f39c12','#e74c3c'];
  const tierCounts = tierOrder.map(t => filtered.filter(d=>d['上月档位']=== t).length);
  if (tierChart) tierChart.destroy();
  tierChart = new Chart(document.getElementById('tierChart'), {
    type: 'doughnut',
    data: { labels: tierOrder, datasets: [{ data: tierCounts, backgroundColor: tierColors, borderWidth:2, borderColor:'white' }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:8}}} }
  });

  // AI rate histogram
  const aiVals = filtered.map(d => d['当月AI开启率']).filter(v=>v!=null);
  const bins = ['0-20','20-40','40-60','60-80','80-100'];
  const binCounts = [0,0,0,0,0];
  aiVals.forEach(v => {
    const i = Math.min(Math.floor(v/20), 4);
    binCounts[i]++;
  });
  const aiGradient = ['#fee2e2','#fef3c7','#dbeafe','#d4f5e9','#d4f5e9'];
  const aiBorder = ['#e74c3c','#f39c12','#3498db','#2ecc71','#1a8a5e'];
  if (aiHistChart) aiHistChart.destroy();
  aiHistChart = new Chart(document.getElementById('aiHistChart'), {
    type:'bar',
    data:{ labels:bins.map(b=>b+'%'), datasets:[{label:'客户数',data:binCounts,backgroundColor:aiGradient,borderColor:aiBorder,borderWidth:2,borderRadius:6}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'#f0f2f5'},ticks:{font:{size:11}}}}}
  });

  // Active days distribution
  const dayVals = filtered.map(d => d['本月活跃天数']).filter(v=>v!=null).map(v=>Math.round(v));
  const maxDays = Math.max(...dayVals, 1);
  const dayBins = Array.from({length: Math.min(maxDays+1,32)}, (_,i)=>i);
  const dayCounts = dayBins.map(d => dayVals.filter(v=>v===d).length);
  if (daysChart) daysChart.destroy();
  daysChart = new Chart(document.getElementById('daysChart'), {
    type:'bar',
    data:{ labels:dayBins.map(d=>d+'天'), datasets:[{label:'客户数',data:dayCounts,backgroundColor:'#0f346099',borderColor:'#0f3460',borderWidth:1,borderRadius:4}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:0}},y:{grid:{color:'#f0f2f5'},ticks:{font:{size:11}}}}}
  });
}

function renderTable() {
  const q = document.getElementById('table-search').value.toLowerCase();
  let rows = filtered.filter(d =>
    !q || (d['客户名称']||''). toLowerCase().includes(q) || (d['CSM负责人']||''). toLowerCase().includes(q)
  );
  if (sortCol) {
    rows = [...rows].sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) return 1; if (vb == null) return -1;
      if (typeof va === 'number') return (va - vb) * sortDir;
      return String(va).localeCompare(String(vb), 'zh') * sortDir;
    });
  }
  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = rows.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = pageRows.map(d => `
    <tr>
      <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d['客户名称']}"">${d['客户名称'] || '—'}</td>
      <td>${(d['CSM负责人']||'—').replace(/([A-Za-z]+)/, m=>m.slice(0,8))}</td>
      <td>${getTierBadge(d['上月档位'])}</td>
      <td>${getChangeBadge(d['本月档位变动'])}</td>
      <td><div class="ai-bar-wrap"><div class="ai-bar" style="width:${Math.min(d['当月AI开启率']||0,100)}px"></div><span class="ai-val">${d['当月AI开启率'] != null ? d['当月AI开启率'].toFixed(1)+'%' : '—'}</span></div></td>
      <td style="text-align:center">${d['本月活跃天数'] != null ? d['本月活跃天数']+' 天' : '—'}</td>
      <td style="text-align:center">${d['过去7天活跃天数'] != null ? d['过去7天活跃天数']+' 天' : '—'}</td>
      <td style="color:#888">${d['最新服务日期'] || '—'}</td>
    </tr>
  `).join('');

  document.getElementById('page-info').textContent = `第 ${start+1}–${Math.min(start+PAGE_SIZE,total)} 条，共 ${total} 条`;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const btns = document.getElementById('page-btns');
  btns.innerHTML = '';
  const prev = document.createElement('button');
  prev.className = 'pg-btn'; prev.textContent = '‹'; prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; renderTable(); };
  btns.appendChild(prev);
  const start = Math.max(1, currentPage - 2), end = Math.min(totalPages, start + 4);
  for (let i = start; i <= end; i++) {
    const b = document.createElement('button');
    b.className = 'pg-btn' + (i === currentPage ? ' active' : '');
    b.textContent = i;
    const pg = i;
    b.onclick = () => { currentPage = pg; renderTable(); };
    btns.appendChild(b);
  }
  const next = document.createElement('button');
  next.className = 'pg-btn'; next.textContent = '›'; next.disabled = currentPage === totalPages;
  next.onclick = () => { currentPage++; renderTable(); };
  btns.appendChild(next);
}

function sortTable(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  renderTable();
}

function updateAll() {
  updateKPIs();
  updateCharts();
  renderTable();
}

initFilters();
updateAll();
</script>
</body>
</html>
